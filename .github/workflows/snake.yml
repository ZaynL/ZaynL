name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=%235e5af7&color_dots=%23ebeefe,%23c4cdfe,%238a9cfe,%23506afe,%233d5afe
            dist/github-snake-dark.svg?color_snake=%235e5af7&color_dots=%23161b22,%23182465,%23243698,%233651e4,%233d5afe
  
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
